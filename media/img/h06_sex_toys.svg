<svg xmlns="http://www.w3.org/2000/svg" width="75" height="75" viewBox="0 0 75 75">
  <defs>
    <radialGradient id="g1" cx="65%" cy="10%" r="80%">
      <stop offset="0%" stop-color="rgba(220,40,140,0.26)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="g2" cx="5%" cy="90%" r="80%">
      <stop offset="0%" stop-color="rgba(160,20,100,0.20)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="75" height="75" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <rect width="75" height="75" rx="6" ry="6" fill="#090608"/>

  <g clip-path="url(#clip)">
    <rect width="75" height="75" fill="url(#g1)"/>
    <rect width="75" height="75" fill="url(#g2)"/>
    
    <circle cx="10" cy="8" r="1.0" fill="#ff88bb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="16" r="0.5" fill="#ff88bb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="55" r="1.0" fill="#ff88bb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="7" r="0.5" fill="#ff88bb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <text x="37.5" y="44" font-size="24" text-anchor="middle"
          dominant-baseline="middle" filter="url(#glow)">🎀</text>
    
    <text x="37.5" y="61" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="6.5"
          letter-spacing="1.2" fill="#ff99cc" text-anchor="middle">SEX TOYS</text>
    <line x1="28.5" y1="69" x2="46.5" y2="69"
          stroke="rgba(240,60,155,0.6)" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <rect width="75" height="75" rx="6" ry="6"
        fill="none" stroke="rgba(255,60,160,0.28)" stroke-width="1"/>
</svg>